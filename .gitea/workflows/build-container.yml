name: Build and Push Container Image (Gitea)

# Gitea Actions mirror of .github/workflows/build-container.yml -- runs on a
# self-hosted, ROOTLESS-PODMAN act_runner (no Docker daemon/socket exists),
# and publishes to *this Gitea instance's own container registry* (not
# ghcr.io -- a separate artifact from the GitHub-published image) for every
# RomM version known_sha256.txt covers (scripts/list_known_versions.py).
# Adding support for a new RomM version is still "run refresh.sh, commit the
# result" -- this workflow does the rest automatically. See CLAUDE.md's
# "Versioning model" section.
#
# Things that differ from a blind copy of the GitHub workflow, all required
# for this to actually work here:
#
#   1. No docker/*-actions (setup-buildx-action, login-action,
#      build-push-action) -- they shell out to the `docker` CLI / expect a
#      Docker daemon socket, neither of which exists under rootless Podman.
#      Every build/login/push step below is a plain `podman` CLI call
#      instead, and builds from `Containerfile` (not `Dockerfile`) -- the
#      same podman/docker file split scripts/build-image.sh already uses,
#      see CLAUDE.md's "Building / compiling plugins" section.
#   2. `podman` itself must be on PATH in the job's container image; the
#      "Ensure podman is available" steps below install it (best-effort,
#      apt then apk) if it's missing rather than assuming a particular base
#      image. This assumes the job container's own user can install
#      packages (typically root inside the container even when the host
#      Podman engine running it is rootless) -- if your job image runs as a
#      non-root, no-sudo user, preinstall podman in that image instead.
#   3. Registry: pushes to *this Gitea instance's own* container registry
#      (derived at runtime from github.server_url/github.repository -- no
#      hardcoded host), authenticated with Gitea's auto-injected
#      secrets.GITHUB_TOKEN. That token is only invalid for a *foreign*
#      registry like ghcr.io (see the compat-watch.yml comment on the same
#      point) -- against this instance's own registry it's exactly right,
#      so no extra secret is needed here.
#   4. --storage-opt overlay.ignore_chown_errors=true on every `podman
#      build` below works around a rootless-Podman limitation: without a
#      subuid/subgid range allocated to whatever user is running podman
#      (host or nested job-container user), extracting a multi-owner base
#      image layer (e.g. alpine's /etc/shadow, group 42) fails outright
#      ("insufficient UIDs or GIDs available in user namespace"). This flag
#      tells podman to skip failed ownership fixups instead of aborting the
#      build -- a real tradeoff (some extracted files can end up with
#      silently-wrong ownership) rather than a full fix. The proper fix is
#      allocating that user a real subuid/subgid range (`usermod
#      --add-subuids/--add-subgids`, then `podman system migrate`) and
#      dropping this flag once confirmed working.
#   5. This assumes the runner has outbound access to github.com to fetch
#      actions/checkout, actions/upload-artifact, etc. from the GitHub
#      Marketplace (Gitea's default `DEFAULT_ACTIONS_URL` does this
#      automatically) -- if this instance is air-gapped, swap these `uses:`
#      lines for the mirrors at https://gitea.com/actions/*.
#   6. No BuildKit means no `type=gha` cache either (that's a BuildKit-only
#      cache backend, unsupported by Podman/buildah) -- layer caching here
#      is whatever podman's own local storage gives you between runs on the
#      same runner, nothing explicit to configure.

on:
  push:
    branches:
      - main
    paths:
      - 'Containerfile'
      - 'Dockerfile'
      - 'include/**'
      - 'plugins/**'
      - 'src/**'
      - 'overrides/**'
      - 'roms_handler.patch'
      - 'known_sha256.txt'
      - 'start.sh'
      - 'scripts/refresh.sh'
      - 'scripts/list_known_versions.py'
      - '.gitea/workflows/build-container.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build only this RomM version (e.g. 4.9.2). Leave blank to build every known version.'
        required: false
        default: ''

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Guard -- this repo must never touch RomM's frontend
        # Cheap enforcement of the "indefinite frontend compatibility"
        # commitment (CLAUDE.md's Roadmap section): nothing in the patch
        # mechanism should ever reference a frontend path. Fails fast,
        # before any build work runs, if that ever stops being true.
        run: |
          if grep -riq "frontend" roms_handler.patch overrides/prepatched/*.py 2>/dev/null; then
            echo "::error::Found a 'frontend' reference in roms_handler.patch or overrides/prepatched/ -- this repo commits to never touching RomM's frontend. Investigate before merging." >&2
            grep -rin "frontend" roms_handler.patch overrides/prepatched/*.py
            exit 1
          fi
          echo "OK: no frontend references found."

      - name: List known versions
        id: list
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            python3 scripts/list_known_versions.py --only "${{ github.event.inputs.version }}" > /dev/null
            MATRIX=$(python3 -c 'import json,sys; print(json.dumps([sys.argv[1]]))' "${{ github.event.inputs.version }}")
          else
            MATRIX=$(python3 scripts/list_known_versions.py --json)
          fi
          echo "Building matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  sign-plugins:
    # Builds the plugins once (version-independent -- a plugin .so has no
    # RomM/Python-version coupling at all, see plugins/README.md) and signs
    # them with PLUGIN_SIGNING_KEY, so every matrix leg below reuses one
    # signed artifact instead of rebuilding+resigning per RomM version.
    #
    # The private key lives only in this job, only for the few seconds it
    # takes to sign, and is deleted immediately after. It is never written
    # anywhere inside the Docker build context or an image layer -- see
    # plugins/README.md's "Signing and FAST_SCAN_ALLOW_UNSIGNED_PLUGINS"
    # for why that's a hard requirement, not a preference.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure podman is available
        run: |
          command -v podman >/dev/null 2>&1 && exit 0
          (apt-get update && apt-get install -y podman) 2>/dev/null \
            || apk add --no-cache podman 2>/dev/null \
            || { echo "::error::podman not found and could not be installed -- this runner's job image needs podman preinstalled." >&2; exit 1; }

      - name: Build plugins-export stage only (no image produced)
        run: |
          podman build \
            --storage-opt overlay.ignore_chown_errors=true \
            --file ./Containerfile \
            --target plugins-export \
            --output type=local,dest=./built-plugins \
            .

      - name: Sign official plugins
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
        run: |
          if [ -z "$PLUGIN_SIGNING_KEY" ]; then
            echo "::error::PLUGIN_SIGNING_KEY secret is not set -- cannot sign official plugins. Every plugin will load unsigned (requiring FAST_SCAN_ALLOW_UNSIGNED_PLUGINS=1) until this is fixed." >&2
            exit 1
          fi

          KEY_FILE="$RUNNER_TEMP/plugin-signing-key"
          (umask 077 && printf '%s\n' "$PLUGIN_SIGNING_KEY" > "$KEY_FILE")

          SIGNED_ANY=0
          for manifest in built-plugins/*/plugin.json; do
            [ -f "$manifest" ] || continue
            plugin_dir=$(dirname "$manifest")
            plugin_name=$(basename "$plugin_dir")
            so_file=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['so_file'])" "$manifest")
            so_path="$plugin_dir/$so_file"
            echo "Signing $plugin_name ($so_path)"
            ssh-keygen -Y sign -f "$KEY_FILE" -n romm-fast-scan-plugin "$so_path"
            SIGNED_ANY=1
          done

          rm -f "$KEY_FILE"

          if [ "$SIGNED_ANY" = "0" ]; then
            echo "::error::No plugin.json found under built-plugins/ -- nothing was signed. Check the plugins-export stage." >&2
            exit 1
          fi

      - name: Upload signed plugins artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-plugins
          path: built-plugins/
          retention-days: 1
          if-no-files-found: error

  build:
    needs: [versions, sign-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.versions.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download signed plugins artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-plugins
          path: plugins/

      - name: Ensure podman is available
        run: |
          command -v podman >/dev/null 2>&1 && exit 0
          (apt-get update && apt-get install -y podman) 2>/dev/null \
            || apk add --no-cache podman 2>/dev/null \
            || { echo "::error::podman not found and could not be installed -- this runner's job image needs podman preinstalled." >&2; exit 1; }

      - name: Resolve this Gitea instance's registry and image name
        run: |
          REGISTRY=$(printf '%s' "${{ github.server_url }}" | sed -e 's#^https\?://##')
          IMAGE_NAME=$(printf '%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"

      - name: Log in to Gitea Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          TAG="$REGISTRY/$IMAGE_NAME:${{ matrix.version }}-fast-scan"
          podman build \
            --storage-opt overlay.ignore_chown_errors=true \
            --file ./Containerfile \
            --build-arg BASE_IMAGE=docker.io/rommapp/romm:${{ matrix.version }} \
            --tag "$TAG" \
            .
          podman push "$TAG"
          echo "Image pushed: $TAG"

      - name: Image pushed successfully
        run: |
          echo "Image: $REGISTRY/$IMAGE_NAME:${{ matrix.version }}-fast-scan"
          echo "To use it:"
          echo "  image: $REGISTRY/$IMAGE_NAME:${{ matrix.version }}-fast-scan"

      - name: Log out of Gitea Container Registry
        if: always()
        run: podman logout "$REGISTRY" || true
